name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck scripts/chr

      - name: shfmt
        run: |
          sudo apt-get install -y shfmt
          shfmt --diff scripts/chr completions/chr.bash
